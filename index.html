<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Lani Gift Atelier</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#F7F1EB] text-gray-800">
  <header class="px-6 py-10 text-center">
    <h1 class="text-4xl font-serif">Little Lani Gift Atelier</h1>
    <p class="mt-3 text-lg text-gray-600">Curated gifts made with love</p>
    <p class="mt-2 text-sm">For birthdays • baby showers • thank you gifts • just because</p>
  </header>

  <section class="max-w-6xl mx-auto px-6 py-8">
    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="bg-white rounded-3xl shadow-sm p-5 border border-[#EADFD5]">
        <div class="h-44 rounded-2xl bg-[#EFE4DA] mb-4 flex items-center justify-center text-sm text-gray-500">Product Photo</div>
        <span class="text-xs bg-[#F3E8DD] px-3 py-1 rounded-full">Best Seller</span>
        <h3 class="mt-3 text-lg font-medium">Baby Shower Gift Box</h3>
        <p class="text-gray-600 mt-1">KSh 2,500</p>
      </div>
      <div class="bg-white rounded-3xl shadow-sm p-5 border border-[#EADFD5]">
        <div class="h-44 rounded-2xl bg-[#EFE4DA] mb-4 flex items-center justify-center text-sm text-gray-500">Product Photo</div>
        <span class="text-xs bg-[#F3E8DD] px-3 py-1 rounded-full">Popular</span>
        <h3 class="mt-3 text-lg font-medium">Birthday Surprise Box</h3>
        <p class="text-gray-600 mt-1">KSh 3,000</p>
      </div>
    </div>
  </section>
</body>
</html>
